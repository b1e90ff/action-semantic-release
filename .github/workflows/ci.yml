name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-action:
    name: Action Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mpalmer/action-validator@main
        with:
          version: 0.6.0

  lint-scripts:
    name: Shell Scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ludeeus/action-shellcheck@master
        with:
          scandir: scripts

  lint-workflows:
    name: Workflow Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: raven-actions/actionlint@v2
        with:
          flags: "-verbose"

  lint-js:
    name: JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: |
          npm install --no-save eslint @eslint/js globals
          npx eslint .
